<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大五人格深度测评报告</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --primary: #4338ca; --secondary: #6366f1; --text: #1e293b; --light-text: #64748b; }
        * { box-sizing: border-box; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }
        body { background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 6px; background: #e2e8f0; z-index: 1000; }
        #progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary)); width: 0%; transition: width 0.3s; }
        .quiz-container { max-width: 800px; margin: 40px auto; }
        .card { background: var(--card); padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        .question-text { font-size: 1.3rem; font-weight: 600; line-height: 1.6; margin-bottom: 35px; min-height: 80px; }
        .options-list { display: grid; gap: 15px; }
        .option-btn { background: #f8fafc; border: 2px solid #f1f5f9; padding: 18px; border-radius: 15px; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .option-btn:hover { border-color: var(--primary); background: #f5f7ff; transform: translateY(-2px); }
        .report-section { display: none; animation: slideUp 0.8s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .trait-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 40px; }
        .trait-card { background: #fff; padding: 20px; border: 1px solid #edf2f7; border-radius: 16px; border-top: 5px solid var(--primary); }
        .trait-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .bar-bg { background: #edf2f7; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .bar-fill { height: 100%; background: var(--primary); transition: width 1.5s ease-in-out; }
        .analysis-box { background: #eef2ff; padding: 25px; border-radius: 18px; margin-top: 30px; border: 1px dashed var(--primary); }
        .analysis-title { font-weight: bold; color: var(--primary); font-size: 1.1rem; margin-bottom: 10px; display: flex; align-items: center; }
        .analysis-content { font-size: 0.95rem; line-height: 1.7; color: #374151; }
        .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; margin-top: 20px; }
        .input-box { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; margin-top: 8px; outline: none; transition: 0.2s; }
        .input-box:focus { border-color: var(--primary); }
    </style>
</head>
<body>

    <div class="progress-container"><div id="progress-bar"></div></div>

    <div class="quiz-container">
        <!-- 信息登记 -->
        <div id="start-card" class="card">
            <h2>大五人格个性测评</h2>
            <div style="margin-bottom:20px">
                <label style="font-size:0.9rem; color:var(--light-text)">被试人姓名</label>
                <input type="text" id="subj-name" class="input-box" placeholder="请输入真实姓名">
            </div>
            <div style="margin-bottom:20px">
                <label style="font-size:0.9rem; color:var(--light-text)">学号 / ID</label>
                <input type="text" id="stu-id" class="input-box" placeholder="请输入您的学号">
            </div>
            <div style="margin-bottom:30px">
                <label style="font-size:0.9rem; color:var(--light-text)">性别</label>
                <select id="gender" class="input-box">
                    <option value="">-- 请选择 --</option><option value="男">男</option><option value="女">女</option>
                </select>
            </div>
            <button class="btn-main" onclick="validateStart()">开始测评</button>
        </div>

        <!-- 答题区 -->
        <div id="question-card" class="card" style="display: none;">
            <div style="color:var(--primary); font-size:0.85rem; font-weight:bold; margin-bottom:15px" id="step-info">1 / 60</div>
            <div id="q-text" class="question-text">加载中...</div>
            <div class="options-list">
                <button class="option-btn" onclick="nextStep(1)">1. 完全不同意</button>
                <button class="option-btn" onclick="nextStep(2)">2. 不太同意</button>
                <button class="option-btn" onclick="nextStep(3)">3. 有些同意</button>
                <button class="option-btn" onclick="nextStep(4)">4. 同意</button>
                <button class="option-btn" onclick="nextStep(5)">5. 完全同意</button>
            </div>
            <div style="margin-top:25px; color:var(--light-text); font-size:0.85rem; cursor:pointer" onclick="goBack()">← 返回上一题</div>
        </div>

        <!-- 深度报告区 -->
        <div id="report-view" class="report-section card">
            <h2>测评深度解析报告</h2>
            <p id="user-display" style="text-align:center; color:var(--light-text); margin-bottom:40px"></p>
            
            <div id="trait-results" class="trait-grid"></div>

            <div class="analysis-box">
                <div class="analysis-title">✨ 综合人格画像</div>
                <div id="portrait-text" class="analysis-content">计算中...</div>
            </div>

            <div class="analysis-box" style="background:#f0fdf4; border-color:#22c55e">
                <div class="analysis-title" style="color:#15803d">🚀 针对性发展建议</div>
                <div id="advice-text" class="analysis-content">计算中...</div>
            </div>

            <button class="btn-main" style="background:var(--light-text)" onclick="location.reload()">重新测评</button>
        </div>
    </div>

    <script>
        // --- 请替换为您自己的真实配置 ---
        const SUPABASE_URL = 'https://pqnjxmxczexoueqqhito.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxbmp4bXhjemV4b3VlcXFoaXRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5ODgxMjcsImV4cCI6MjA4OTU2NDEyN30.iJ-RAXujlUH5POfmJTIYJX8jMgiN7FR6QuzBh9AqicU';
        
        let _supabase;
        try {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch(e) { console.error("初始化错误", e); }

        const questions = ["我无忧无虑","我喜欢周围人多","我不喜欢想入非非","我尽量对我所遇到的任何人以礼相待","我将自己的物品保持得干干净净且井井有条","我常常感到不如别人","我很容易大笑","我发现哲学争论很无聊","我经常同我的家人和同事争吵","我比较善于安排将事情按时做完","当我压力重重时，有时就会感到要身心崩溃","我并不认为自己的心情非常愉快","艺术和自然界的各种状态常激起我的好奇心","有人认为我自私且以自我为中心","我并不是一个做事很有条理的人","我很少感到孤独或愁闷","我的确喜欢与人交谈","我认为，让学生听一些有争议的演讲只会使他们迷惑不解或产生误导","我宁愿与他人合作，也不与他们竞争","我努力把分给我的任务尽心尽职地去做好","我经常感到紧张而且神经过敏","我喜欢付诸行动的过程","诗歌对我的影响很少或者根本没有什么影响","我常会怀疑别人的用意","我有明确的目标，并且按部就班地朝着它们努力","我有时感到自己毫无价值","我往往喜欢单独做事情","我经常品尝一些新的外来食品","我认为，如果你不防备，大多数人就会利用你","在静下来工作之前，我会浪费很多时间","我很少感到惧怕或焦虑不安","我常常感到自己精力充沛无比","我极少注意到不同的环境所引起的情绪或感觉上的变化","我认识的大多数人都喜欢我","我为达到自己的目标做不懈的努力","我常常为人们对待我的方式而感到气愤","我是一个快活、充满激情的人","某些音乐能够引发我无限的想象","有些人认为我冷漠无情且斤斤计较","一旦我开始从事某件事，我一定坚持把这件事情做完","一旦事情变糟，我常常会失去信心并且想放弃","我并不认为是一个乐观派人物","有时候当我在阅读诗歌或欣赏文艺作品时，我会激动不已","我这人任性，不轻易改变自己的态度","有时候，我不能做一个像我应该做到的那样可靠的人","我很少感到悲伤或沮丧","我的生活节奏很快","我对探索宇宙或人类的本质根本没有多大的兴趣","我一般情况下会周密思考并为他人着想","我是一个办事效率高并且总把自己的工作完成的人","我常常感到孤立无援，并且希望有其他人来解决我面临的问题","我是一个很活跃的人","我的求知欲望十分强烈","如果我不喜欢别人，我就会让他们知道","我从不感到自己做事有头绪","有时我感到难为情，以至于自己想躲起来","与其领导别人，不如走我自己的路","我很喜欢理论或抽象的概念","如果需要的话，我会利用别人来达到自己的目的","我力求使自己做的每一件事情精益求精"];

        const scoring = {
            N: { items: [1, 6, 11, 16, 21, 26, 31, 36, 41, 46, 51, 56], reverse: [1, 16, 31, 46], name: "神经质 (情绪不稳性)" },
            E: { items: [2, 7, 12, 17, 22, 27, 32, 37, 42, 47, 52, 57], reverse: [12, 27, 42, 57], name: "外向性" },
            O: { items: [3, 8, 13, 18, 23, 28, 33, 38, 43, 48, 53, 58], reverse: [3, 8, 18, 23, 33, 48], name: "开放性" },
            A: { items: [4, 9, 14, 19, 24, 29, 34, 39, 44, 49, 54, 59], reverse: [9, 14, 24, 29, 39, 44, 54, 59], name: "宜人性" },
            C: { items: [5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60], reverse: [15, 30, 45, 55], name: "尽责性" }
        };

        let userInfo = { id: "", name: "", gender: "" };
        let answers = [];
        let currentIndex = 0;

        function validateStart() {
            const name = document.getElementById('subj-name').value.trim();
            const id = document.getElementById('stu-id').value.trim();
            const gen = document.getElementById('gender').value;
            
            if(!name || !id || !gen) return alert("请填写姓名、学号和性别");
            
            userInfo = { id, name, gender: gen };
            document.getElementById('start-card').style.display='none';
            document.getElementById('question-card').style.display='block';
            updateUI();
        }

        function updateUI() {
            document.getElementById('q-text').innerText = (currentIndex + 1) + ". " + questions[currentIndex];
            document.getElementById('step-info').innerText = (currentIndex + 1) + " / 60";
            document.getElementById('progress-bar').style.width = (currentIndex / 60 * 100) + "%";
            window.scrollTo(0,0);
        }

        async function nextStep(val) {
            answers[currentIndex] = val;
            if(currentIndex < 59) { currentIndex++; updateUI(); } 
            else { await submitAndReport(); }
        }

        function goBack() { if(currentIndex > 0) { currentIndex--; updateUI(); } }

        async function submitAndReport() {
            document.getElementById('question-card').style.display='none';
            document.getElementById('report-view').style.display='block';
            document.getElementById('user-display').innerText = `受测者：${userInfo.name} (${userInfo.id}) | 性别：${userInfo.gender}`;
            
            const scores = calculate();
            render(scores);
            generateAnalysis(scores);

            const payload = { 
                student_id: userInfo.id, 
                subject_name: userInfo.name, // 对应 SQL 里的字段
                gender: userInfo.gender 
            };
            answers.forEach((v, i) => payload[`q${i+1}`] = v);

            if(_supabase) {
                const { error } = await _supabase.from('big_five_survey').insert([payload]);
                if(error) console.error("上传错误:", error);
            }
        }

        function calculate() {
            let res = { N: 0, E: 0, O: 0, A: 0, C: 0 };
            for(let k in scoring) {
                scoring[k].items.forEach(num => {
                    let s = answers[num-1];
                    if(scoring[k].reverse.includes(num)) s = 6 - s;
                    res[k] += s;
                });
            }
            return res;
        }

        function render(scores) {
            const container = document.getElementById('trait-results');
            container.innerHTML = "";
            for(let k in scores) {
                const s = scores[k];
                const p = ((s - 12) / 48 * 100).toFixed(0);
                container.innerHTML += `
                    <div class="trait-card">
                        <div class="trait-info"><span>${scoring[k].name}</span><strong>${s} 分</strong></div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div>
                    </div>`;
            }
        }

        function generateAnalysis(s) {
            let portrait = "";
            let advice = "";

            if(s.E > 45 && s.A > 45) portrait += "你是一个典型的“社交核心”。你不仅充满能量，而且待人真诚友善，在团队中极具亲和力。";
            else if(s.E < 30 && s.C > 45) portrait += "你展现出“低调实干家”的特征。你更倾向于独立思考，做事严谨踏实，是极其可靠的幕后支撑。";
            else if(s.N > 45 && s.C > 45) portrait += "你具备“完美主义压力者”的特质。你对自己要求极高，这虽助你取得成就，但也让你经常处于焦虑和紧绷之中。";
            else portrait += "你的性格表现较为平衡。你能够根据环境的变化灵活调整自己的社交状态和工作节奏。";

            if(s.O > 45) portrait += " 此外，你拥有极强的好奇心和想象力，不愿墨守成规。";
            if(s.N < 30) portrait += " 你极佳的心理弹性让你在危机面前能保持罕见的冷静。";

            advice += `• <b>针对情绪管理：</b>${s.N > 40 ? "尝试练习冥想或正念，学会与不确定性共处，减少自我批判。" : "继续保持你的情绪稳定性，在团队面临波动时，你可以扮演‘压舱石’的角色。"}<br>`;
            advice += `• <b>针对工作学习：</b>${s.C < 35 ? "你可能更适合创意类工作，但建议建立微小的清单习惯，避免细节遗漏。" : "警惕完美主义带来的职业倦怠，学会‘适可而止’是一门艺术。"}<br>`;
            advice += `• <b>针对人际交往：</b>${s.A < 35 ? "在表达理性观点时，尝试增加一点同理心，这会让你的建议更容易被他人采纳。" : "你习惯迁就他人，建议在核心利益上勇敢表达自己的真实诉求。"}`;

            document.getElementById('portrait-text').innerHTML = portrait;
            document.getElementById('advice-text').innerHTML = advice;
        }
    </script>
</body>
</html>
